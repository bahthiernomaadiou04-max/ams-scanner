<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AM'S SCANNER</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:linear-gradient(135deg,#0f172a,#1e293b);

height:100vh;

display:flex;

justify-content:center;

align-items:center;

}

.container{

width:95%;

max-width:500px;

background:white;

border-radius:25px;

padding:30px;

box-shadow:0 15px 40px rgba(0,0,0,.25);

text-align:center;

}

h1{

font-size:32px;

color:#2563eb;

margin-bottom:10px;

}

p{

color:#64748b;

margin-bottom:25px;

}

#reader{

width:100%;

min-height:320px;

border:3px dashed #2563eb;

border-radius:20px;

}

</style>

<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<div class="container">

<h1>📷 AM'S SCANNER</h1>

<p>

Scanner QR Code & Code-barres

</p>

<div id="reader"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {

getDatabase,

ref,

set

} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyCAWrkTm-zlKWQXu9n0hOvOYFC0I3_VlbU",

authDomain: "ams-digital-8e7db.firebaseapp.com",

databaseURL: "https://ams-digital-8e7db-default-rtdb.europe-west1.firebasedatabase.app",

projectId: "ams-digital-8e7db",

storageBucket: "ams-digital-8e7db.firebasestorage.app",

messagingSenderId: "662069455034",

appId: "1:662069455034:web:4231f13fddcfaad33efa83"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

function qrTrouve(decodedText){

set(

ref(db,"scanner"),

{

contenu:decodedText,

date:new Date().toISOString()

}

)

.then(function(){

alert("✅ Produit envoyé");

})

.catch(function(err){

alert(err);

});

}

const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(

{facingMode:"environment"},

{

fps:10,

qrbox:250

},

qrTrouve,

function(){}

)

.catch(function(err){

alert("Erreur : "+err);

});

</script>

</body>

</html>
