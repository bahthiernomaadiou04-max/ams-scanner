<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AM'S SCANNER</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:linear-gradient(135deg,#0f172a,#1e293b);

height:100vh;

display:flex;

justify-content:center;

align-items:center;

}

.container{

width:95%;

max-width:500px;

background:white;

border-radius:25px;

padding:30px;

box-shadow:0 15px 40px rgba(0,0,0,.25);

text-align:center;

}

h1{

font-size:32px;

color:#2563eb;

margin-bottom:10px;

}

p{

color:#64748b;

margin-bottom:25px;

}

#reader{

width:100%;

min-height:320px;

border:3px dashed #2563eb;

border-radius:20px;

display:flex;

justify-content:center;

align-items:center;

font-size:20px;

color:#2563eb;

font-weight:bold;

}

</style>

<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<div class="container">

<h1>📷 AM'S SCANNER</h1>

<p>

Scanner QR Code & Code-barres

</p>

<div id="reader">
<video id="camera"
autoplay
playsinline
style="width:100%;border-radius:20px;">
</video>
</div>

</div>

<script>

async function ouvrirCamera(){

try{

const flux =
await navigator.mediaDevices.getUserMedia({

video:{
facingMode:"environment"
}

});

document.getElementById("camera").srcObject =
flux;

}catch(e){

alert(

"Erreur : " +

e.name +

"\n" +

e.message

);

}

}

ouvrirCamera();

</script>

</body>

</html>
